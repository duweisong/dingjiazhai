name: Daily Strategy Push

on:
  schedule:
    # 每个交易日 18:30 北京时间 (10:30 UTC)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:  # 手动触发

jobs:
  scan-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install numpy pandas akshare requests matplotlib

      - name: Run daily scan
        env:
          PP_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          # Override token with GitHub secret
          sed -i "s/PP_TOKEN = .*/PP_TOKEN = \"$PP_TOKEN\"/" examples/daily_push.py
          python examples/daily_push.py --online --ao-only

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: results/latest_report.html
