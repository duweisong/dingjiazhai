name: "Value + Quality Strategy"
version: "1.0"
description: "Combined value and quality factor strategy for A-shares"

universe_filter: "hs300"

factor_exposures:
  value_pe: 0.25
  value_pb: 0.25
  quality_roe: 0.25
  quality_gross_margin: 0.25

signal_weights:
  value_composite: 0.5
  quality_composite: 0.5

regime_gating:
  bear: "passive"
  bull: "active"
  neutral: "active"

constraints:
  max_weight: 0.10
  min_positions: 8
  max_positions: 30

stop_loss_pct: 0.08
take_profit_pct: 0.25
trailing_stop_pct: 0.06
max_single_position: 0.10
max_sector_exposure: 0.30
rebalance_freq: "weekly"
position_method: "signal_strength"
min_signal_strength: 0.3
