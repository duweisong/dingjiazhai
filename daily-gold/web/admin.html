<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 掘金日报 Pro</title>
<style>
  :root { --gold:#d4a017; --dark:#1a1a2e; --card:#16213e; --text:#e0e0e0; --green:#4caf50; --red:#f44336; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background:var(--dark); color:var(--text); min-height:100vh; }
  header { background:linear-gradient(135deg,#0f0c29,#302b63); padding:20px 30px; border-bottom:2px solid var(--gold); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:15px; }
  header h1 { color:var(--gold); }
  header a { color:var(--gold); text-decoration:none; }
  .container { max-width:1200px; margin:0 auto; padding:30px 20px; }
  .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:30px; }
  .kpi-card { background:var(--card); border-radius:12px; padding:25px; text-align:center; border:1px solid #333; }
  .kpi-card .value { font-size:2.5em; font-weight:bold; color:var(--gold); }
  .kpi-card .label { color:#999; margin-top:5px; }
  .kpi-card .trend { font-size:0.85em; margin-top:5px; }
  .kpi-card .trend.up { color:var(--green); }
  .section-title { color:var(--gold); margin:30px 0 15px; font-size:1.5em; }
  table { width:100%; border-collapse:collapse; background:var(--card); border-radius:12px; overflow:hidden; }
  th { background:#2a2a4a; padding:12px 15px; text-align:left; color:var(--gold); }
  td { padding:10px 15px; border-bottom:1px solid #333; }
  tr:hover { background:#1e2a4a; }
  .badge { display:inline-block; padding:3px 12px; border-radius:12px; font-size:0.8em; font-weight:bold; }
  .badge.pro { background:var(--gold); color:var(--dark); }
  .badge.vip { background:#ff6b35; color:#fff; }
  .badge.free { background:#444; color:#999; }
  .btn { display:inline-block; padding:8px 25px; border-radius:20px; font-weight:bold; text-decoration:none; border:none; cursor:pointer; font-size:0.9em; }
  .btn-gold { background:var(--gold); color:var(--dark); }
  .btn-outline { border:2px solid var(--gold); color:var(--gold); background:transparent; }
  .btn-danger { background:var(--red); color:#fff; }
  .flex-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:15px 0; }
  #loading { text-align:center; padding:50px; color:#666; }
  @media (max-width:768px) { .kpi-grid { grid-template-columns:repeat(2, 1fr); } }
</style>
</head>
<body>

<header>
  <h1>掘金日报 Pro · 管理后台</h1>
  <div>
    <a href="/">首页</a> &nbsp;|&nbsp;
    <button class="btn btn-gold" onclick="runDaily()">手动执行每日信号</button>
  </div>
</header>

<div class="container" id="content">
  <div id="loading">加载中...</div>
</div>

<script>
async function loadAdmin() {
  try {
    const res = await fetch('/api/admin/stats');
    const d = await res.json();
    render(d);
  } catch(e) {
    document.getElementById('loading').innerHTML = `
      <h2 style="color:var(--red);">服务器未启动</h2>
      <p>请先运行: <code>cd daily-gold && npm start</code></p>
      <p>或双击 <code>start.bat</code></p>
      <pre style="margin-top:20px;padding:20px;background:var(--card);border-radius:12px;text-align:left;">
   cd C:\\AI\\daily-gold
   npm install
   npm start</pre>
    `;
  }
}

function render(d) {
  document.getElementById('content').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card"><div class="value">${d.total}</div><div class="label">总订阅用户</div></div>
      <div class="kpi-card"><div class="value">${d.paying}</div><div class="label">付费用户</div><div class="trend up">转化率 ${d.conversion}</div></div>
      <div class="kpi-card"><div class="value">Y${d.mrr}</div><div class="label">月经常收入 (MRR)</div></div>
      <div class="kpi-card"><div class="value">Y${d.arr}</div><div class="label">年经常收入 (ARR)</div></div>
    </div>

    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:30px;">
      <div class="kpi-card"><div class="value" style="color:var(--green);">${d.by_tier.free}</div><div class="label">免费用户</div></div>
      <div class="kpi-card"><div class="value">${d.by_tier.pro}</div><div class="label">Pro用户 (Y29)</div></div>
      <div class="kpi-card"><div class="value">${d.by_tier.vip}</div><div class="label">VIP用户 (Y99)</div></div>
      <div class="kpi-card">
        <div class="value" style="font-size:1.5em;color:#999;">Y${d.costs.total}/月</div>
        <div class="label">运营成本</div>
        <div class="trend up">利润 Y${d.mrr - d.costs.total}/月</div>
      </div>
    </div>

    <h3 class="section-title">目标进度 (月入Y47,812的10% = Y4,781)</h3>
    <div style="background:#333;border-radius:20px;height:30px;margin:10px 0 20px;overflow:hidden;">
      <div style="background:linear-gradient(90deg,var(--gold),var(--green));height:100%;width:${Math.min(100, (d.mrr/4781*100).toFixed(1))}%;display:flex;align-items:center;justify-content:center;color:var(--dark);font-weight:bold;font-size:0.9em;border-radius:20px;">
        ${(d.mrr/4781*100).toFixed(1)}% (Y${d.mrr} / Y4,781)
      </div>
    </div>

    <h3 class="section-title">最近支付记录</h3>
    ${d.recent_payments && d.recent_payments.length > 0 ? `
      <table>
        <thead><tr><th>时间</th><th>用户</th><th>档位</th><th>金额</th></tr></thead>
        <tbody>
          ${d.recent_payments.map(p=>'<tr><td>'+new Date(p.paid_at).toLocaleString('zh-CN')+'</td><td>'+p.uid+'</td><td><span class="badge '+p.tier+'">'+p.tier.toUpperCase()+'</span></td><td style="color:var(--gold);">Y'+p.amount+'</td></tr>').join('')}
        </tbody>
      </table>
    ` : '<p style="color:#666;">暂无支付记录。去首页订阅第一个用户!</p>'}
  `;
}

async function runDaily() {
  try {
    const res = await fetch('/api/run-daily', {method:'POST'});
    const d = await res.json();
    alert(d.ok ? '信号运行成功!' : ('运行失败: '+(d.error||d.msg)));
    if (d.ok) loadAdmin();
  } catch(e) { alert('服务器未启动'); }
}

loadAdmin();
setInterval(loadAdmin, 30000);
</script>

</body>
</html>
