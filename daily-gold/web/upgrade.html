<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>升级订阅 - 掘金日报 Pro</title>
<style>
  :root { --gold:#d4a017; --dark:#1a1a2e; --card:#16213e; --text:#e0e0e0; --green:#4caf50; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background:var(--dark); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .card { background:var(--card); border-radius:16px; padding:40px; max-width:480px; width:90%; border:2px solid var(--gold); text-align:center; }
  .card h1 { color:var(--gold); margin-bottom:10px; }
  .card .price { font-size:3em; color:var(--gold); font-weight:bold; margin:20px 0; }
  .card .sub { color:#999; margin-bottom:20px; }
  .form-group { margin:15px 0; text-align:left; }
  .form-group label { display:block; margin-bottom:5px; color:#aaa; }
  .form-group input, .form-group select {
    width:100%; padding:12px 15px; border-radius:8px; border:2px solid #444;
    background:#222; color:#fff; font-size:1em;
  }
  .form-group input:focus, .form-group select:focus { outline:none; border-color:var(--gold); }
  .btn {
    display:inline-block; padding:14px 50px; border-radius:30px; font-size:1.1em;
    font-weight:bold; border:none; cursor:pointer; margin-top:20px;
    background:var(--gold); color:var(--dark); transition:all 0.3s;
  }
  .btn:hover { background:#e6b800; transform:scale(1.05); }
  .qr { margin:20px 0; padding:20px; background:#fff; border-radius:12px; display:none; }
  .qr p { color:#333; font-weight:bold; }
  .back { color:var(--gold); text-decoration:none; font-size:0.9em; display:block; margin-top:20px; }
  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--green); color:#fff; padding:12px 30px; border-radius:30px; z-index:1000; display:none; font-weight:bold; }
</style>
</head>
<body>

<div class="card">
  <h1>升级到 <span id="tier-name">Pro</span></h1>
  <div class="price">Y<span id="tier-price">29</span></div>
  <div class="sub">/月 · 年付省2个月</div>

  <form id="pay-form" onsubmit="confirmPayment(event)">
    <div class="form-group">
      <label>订阅档位</label>
      <select id="tier-select" onchange="updateTier()">
        <option value="pro">Pro版 - Y29/月</option>
        <option value="vip">VIP版 - Y99/月</option>
      </select>
    </div>
    <div class="form-group">
      <label>邮箱 (用于接收每日信号)</label>
      <input type="email" id="email" placeholder="your@email.com" required>
    </div>
    <div class="form-group">
      <label>用户ID</label>
      <input type="text" id="uid" readonly style="color:#888;">
    </div>
    <button type="submit" class="btn">确认支付 Y<span id="btn-amount">29</span></button>
  </form>

  <div class="qr" id="qr-code">
    <p>请扫码支付 (演示模式)</p>
    <div style="width:200px;height:200px;background:#f0f0f0;margin:15px auto;display:flex;align-items:center;justify-content:center;color:#999;border-radius:8px;">
      微信/支付宝<br>扫码支付 (开发中)
    </div>
    <button class="btn" onclick="confirmPaymentDirect()">模拟支付成功</button>
  </div>

  <a href="/" class="back">返回首页</a>
</div>

<div class="toast" id="toast"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const uid = params.get('uid') || '';
  const tier = params.get('tier') || 'pro';

  document.getElementById('uid').value = uid;
  document.getElementById('tier-select').value = tier;
  updateTier();

  function updateTier() {
    const t = document.getElementById('tier-select').value;
    const price = t==='pro' ? 29 : 99;
    document.getElementById('tier-name').textContent = t==='pro'?'Pro':'VIP';
    document.getElementById('tier-price').textContent = price;
    document.getElementById('btn-amount').textContent = price;
  }

  function confirmPayment(e) {
    e.preventDefault();
    document.getElementById('qr-code').style.display = 'block';
  }

  async function confirmPaymentDirect() {
    const tier = document.getElementById('tier-select').value;
    const amount = tier==='pro'?29:99;

    try {
      const res = await fetch('/api/payment/confirm', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({uid, tier, amount})
      });
      const data = await res.json();
      if (data.ok) {
        showToast(data.msg);
        setTimeout(()=>{ window.location.href='/'; }, 1500);
      } else {
        showToast(data.msg);
      }
    } catch(e) {
      // 演示模式: 即使服务器未启动也给出反馈
      showToast('演示模式: 支付确认成功! (实际需要启动服务器)');
      setTimeout(()=>{ window.location.href='/'; }, 1500);
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display = 'block';
    setTimeout(()=>{t.style.display='none';}, 3000);
  }
</script>
</body>
</html>
